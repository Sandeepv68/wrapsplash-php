name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-dev

      - name: Validate composer.json
        run: composer validate --strict

      - name: Run tests against tag
        run: |
          composer install
          vendor/bin/phpunit

      - name: Generate changelog from tags
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$CURRENT_TAG")
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" HEAD)
          fi

          # Write multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ## Installation

            ```sh
            composer require sandeepv/wrapsplash-php
            ```

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }}
          generate_release_notes: false
